# =============================================================================
# 九-C、系统回溯验证（基于2025年真实录取数据）
# 数据来源：杭州网(ori.hangzhou.com.cn)、杭州政协网(hzzx.gov.cn)、市教育局官网
# 2025年第一批录取分数线发布于2025-07-06，分配生录取完成于2025-07-04
# 回溯日期：2026-06-05
# =============================================================================
backtest_validation_2025:
  purpose: "用2025年真实录取数据验证系统预测模型准确度"
  
  # === 验证一：2025年分数线数据完整性 ===
  score_line_accuracy:
    note: "系统内2025分数线数据来源为杭州本地宝，与实际官方发布对比"
    official_matches:
      - school: "杭二滨江"
        system_score: 630
        official_score: 630
        match: true
      - school: "学军西溪"
        system_score: 629
        official_score: 629
        match: true
      - school: "杭高贡院"
        system_score: 627
        official_score: 627
        match: true
      - school: "一段线"
        system_score: 563
        official_score: 563
        match: true
    result: "PASS - 所有已录入2025分数线与实际官方数据完全一致"
    source_trust_level: "高"

  # === 验证二：分配生公式准确度 ===
  allocation_formula_validation:
    "2025_actual":
      total_allocation: 8004
      total_graduates: 41258
      ratio: "19.40"
      plan_vs_actual: "计划8004，实际录取7930，滑档74人(0.92%)"
      control_line: 563
      control_line_equal_first_tier: true
    formula_check:
      top3_formula: "毕业生 × 3.4%"
      top3_estimated: 1403
      top3_actual: 1410
      top3_deviation: "-0.5%"
      top8_formula: "毕业生 × 9%"
      top8_estimated: 3713
      top8_actual: 3662
      top8_deviation: "+1.4%"
      note: "2025年公式'前三所3.4%/前八所9%/总19.4%'基本准确，偏离<1.5%"
    formula_validation_result: "PASS - 公式预测与实际偏差在可接受范围"

  # === 验证三：2026预测合理性检查 ===
  prediction_reasonableness_2026:
    graduates_change:
      "2025": 41258
      "2026": 44000
      increase: "+2742人(6.6%)"
      note: "搜狗文章数据为增加3100人(约7.8%)，杭州网官方数据约增加3000人"
    allocation_change:
      "2025": 8004
      "2026": 9021
      increase: "+1017(12.7%)"
      ratio_2025: "19.4%"
      ratio_2026: "20.5%"
    score_line_inference:
      first_tier_2025: 563
      first_tier_2026_predicted: 565
      rationale: "考生增加6.6%，学位增加约1800个（新增2校+7扩招），一段线大概率小幅上涨2-4分"
      confidence: "中等"
    top3_inference:
      scores_2025: "627-630"
      predicted_2026: "628-631"
      rationale: "顶尖学生竞争格局稳定，预计微涨+1~+2"
      confidence: "高"
    risk_factors:
      - "中考试卷难度是最大未知变量（2025年社会闭卷元年，难度已回归）"
      - "新增学校分数不确定性高（杭二高新/浙大附实验为首年招生）"
      - "4所县中分数高度不确定（属于'冷门抄底'机会）"

  # === 验证四：滑档风险预估 ===
  slippage_risk_2026:
    "2025_slippage": 74
    "2025_slippage_rate": "0.92%"
    "2026_estimated_slippage": "80-120人"
    note: "2026年控制线预计仍为一段线。若一段线=565，预计滑档率与2025年相近"

# =============================================================================
# 九-D、2027年系统自适应机制
# 目标：2026年中考后自动吸收实际数据，优化2027年推荐逻辑
# =============================================================================
future_readiness_2027:
  purpose: "基于2026年实际录取数据，自动校准系统参数，为2027年志愿填报提供更精准推荐"
  
  # 2026年中考后需要采集合更新的关键数据
  data_to_collect_after_2026_exam:
    - name: "2026年各高中裸考录取分数线"
      action: "获取官方发布的完整分数线列表，替换预测值"
      source: "杭州教育发布 / 杭州网 / 杭州政协网"
      priority: "最高"
    - name: "2026年分配生实际录取数据"
      action: "获取计划数vs实际录取数、滑档人数、控制线"
      source: "杭州市教育局官网（7月4日左右发布）"
      priority: "最高"
    - name: "2026年各初中分配生最低录取名次"
      action: "各初中自行公布或家长分享，验证最低名次修正系数(1.3~1.4)"
      source: "公众号/家长群/19楼/小红书"
      priority: "高"
    - name: "2026年中考难度与分数分布"
      action: "获取全市最高分、各分数段人数，更新密集段位位置"
      source: "杭州教育发布 / 杭州芽儿升学"
      priority: "高"
    - name: "2027年政策变化"
      action: "监控教育局通知，更新招生计划/分配生比例/新增学校"
      source: "杭州市教育局官网"
      priority: "中"
  
  # 自适应校准参数（2026实际数据发布后自动更新）
  auto_calibration_params:
    - param: "一段线"
      "2025_actual": 563
      "2026_predict": 565
      "2026_actual": null
      note: "2026年7月填入实际值，差值用于修正2027年预测"
    - param: "分配生滑档率"
      "2025_actual": "0.92%"
      "2026_predict": "0.9%~1.2%"
      "2026_actual": null
    - param: "最低名次修正系数"
      "2025_actual": "1.3~1.4（基于校内前排名弃选+滑档）"
      "2026_predict": "1.3~1.4"
      "2026_actual": null
      note: "2026年收集各初中实际最低名次后取中位数校准"
    - param: "密集分段位置"
      "2025_actual": "620-625"
      "2026_predict": "620-625（假设难度与2025接近）"
      "2026_actual": null
      note: "取决于2026年中考难度"
    - param: "一模→中考换算修正值"
      "2025_actual": "15~35分"
      "2026_predict": "15~35分"
      "2026_actual": null
      note: "收集各初中一模分与中考分的对比数据后校准"

  # 系统自我更新工作流
  update_workflow:
    step1: "2026年7月：中考成绩+分数线发布 → 替换所有预测值为实际值"
    step2: "2026年7-8月：分配生录取数据发布 → 校准最低名次系数+滑档率"
    step3: "2026年9月：各初中中考成绩汇总（小雨爸爸等） → 更新各初中裸考前三率/重高率/优高率"
    step4: "2027年3-4月：2027年政策发布 → 更新招生计划/新增学校/分配比例"
    step5: "2027年4-5月：2027年区一模划线 → 生成2027年志愿方案"
    step6: "持续监控：20个公众号+抖音/B站/小红书 → 增量更新数据"

# =============================================================================
# 九-E、策略更新对裸考10个志愿的影响分析
# 背景：基于2025年真实案例更新的7项差异（冲幅/超常警告/强制托底/密集段/弱校红利/最低名次/菜中策略）
# =============================================================================
open_exam_strategy_impact:
  purpose: "分析7项策略更新对裸考10个志愿的具体影响"

  changes:
    - id: "U2-冲幅调整"
      source_change: "分配生冲幅5-15→10-20分"
      impact_on_open_exam: "不影响裸考。裸考冲幅仍保持5-15分（裸考无'提前锁死'风险，无需激进）"
      reason: "裸考是事后按分录取，不存在超常后被锁的问题，稳扎稳打是裸考的核心逻辑"
    
    - id: "U4-密集分段警告"
      source_change: "新增620-625分段警告"
      impact_on_open_exam: "【直接且重大】裸考志愿在此分段需重新校准梯度"
      details:
        - "620-625分段内至少拉开3-5分（原先±5分的梯度在此分段不够用）"
        - "此分段的高中学校（杭四下沙622/学军紫金港623/杭十四凤起624/萧山中学621等）竞争最激烈"
        - "建议将620-625分段的学生定位为'稳中带险'，裸考志愿比分配更应保守"
      example: "预估620分的学生，裸考冲623-625（高3-5分），稳618-620（匹配），保615以下（低5分+）"

    - id: "U3-强制托底"
      source_change: "分配生强制第5志愿托底"
      impact_on_open_exam: "【间接影响】裸考的托底逻辑更加重要"
      details:
        - "原规则'保比预估分低10-20分' → 调整为'保至少低20+分'确保绝对安全"
        - "建议裸考第9-10志愿拉开15-20分以上（原为10-20分）"
        - "理由：如果分配生已强制托底但滑档，裸考托底必须更安全"
    
    - id: "U1-超常发挥警告"
      source_change: "新增超常发挥陷阱警告"
      impact_on_open_exam: "【间接影响】裸考志愿建议在稳段多填1-2个"
      details:
        - "如果分配生方案已经激进（冲10-20分），裸考可以更保守作为对冲"
        - "如果分配方案保守，裸考可以更激进作为补充"
        - "核心原则：分配和裸考形成互补，至少一条路的稳/保有保障"

  # 裸考策略核心变化总结
  summary_of_changes:
    before_updates:
      rush: "3个志愿，高5-15分"
      steady: "3-4个志愿，±5分"
      safe: "3个志愿，低10-20分"
    after_updates:
      rush: "3个志愿，高5-15分（不变）"
      dense_note: "如在620-625密集段，稳段志愿间至少拉开3-5分"
      steady: "3-4个志愿，±5分（不变），但密集段需调校"
      safe: "3个志愿，低15-25分（加强托底），第10志愿建议低于预估25+分"
      complementarity: "分配激进 → 裸考保守；分配保守 → 裸考激进。两路互补形成对冲。"

  # 针对不同类型学生的裸考建议
  recommendations_by_type:
    top_student:
      desc: "预估630+分，目标前三所"
      advice: "裸考冲杭二/学军/杭高，稳杭十四/紫金港/杭四下沙，保杭师附/杭高钱江。分配+裸考双保险"
    upper_mid_student:
      desc: "预估620-625分（密集段）"
      advice: "裸考冲杭十四凤起(624)/紫金港(623)/杭四下沙(622)，稳浙大附玉泉(620)/长河(619)，保杭师附(617)/杭高钱江(617)。志愿间至少3-5分"
      warning: "此分段是裸考竞争最激烈区间，一分可能差100-300名"
    mid_student:
      desc: "预估600-619分"
