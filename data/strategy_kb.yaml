# =============================================================================
# 五、志愿填报核心策略矩阵
# =============================================================================
strategies:
  # ---------- 分配生志愿策略 ----------
  allocation:
    description: "校内竞争，核心看校内排名而非分数绝对值"
    positioning:
      method: "校内排名定位法"
      steps:
        - "获取本校各高中的分配生名额数"
        - "预估自己的校内中考成绩排名"
        - "排名 <= 目标高中分配生名额之和 -> 概率高"
        - "排名 > 目标高中分配生名额之和 -> 概率低，重点准备裸考"
    gradient:
      desc: "5个分配生志愿按冲稳保梯度排列"
      note: "基于2025年真实案例修正：冲幅从原5-15分调整为10-20分（大量632-635分考生因保守而后悔）"
      rush: { count: "1-2", gap: "高于预估位次10-20分（比原5-15分更激进，避免超常发挥后后悔）" }
      steady: { count: "2-3", gap: "与预估位次基本匹配（±5分）" }
      safe: { count: "1", gap: "低于预估位次至少10分，强制托底（2025年两位只填头部的学生全部滑档）" }
      mandatory_safety: "第5志愿必须为明确托底——宁可被录也不要滑档去裸考大池子。2025年真实教训：两个优秀学生只填1-2所头部全滑档。"
    school_type_strategy:
      strong_school:
        desc: "重高率>15%的强校"
        advice: "校内竞争激烈，优先确保分配，保守填报，勿全部冲前三所。注意：强校的分配生名额含金量高但竞争惨烈，排名靠前是关键"
      weak_school:
        desc: "重高率<15%的弱校（'菜中'）"
        advice: "校内排名靠前可选激进策略，冲稳保可更积极。弱校分配生红利真实存在：2024年最低捡漏差22分进十四凤起。菜中前几名通过分配生进重高是最强'降维打击'"
        evidence: "2024年案例：595分（低于十四凤起裸考线22分 / 低于源清裸考线3分）→ 通过分配生进十四凤起"
    estimation_formula:
      note: "基于2026年实际数据的经验公式"
      top3_total_allocation: 1410
      top8_total_allocation: 3662
      total_allocation_2026: 9021
      top3_ratio: 3.2
      top8_ratio: "8.3"
      total_ratio: 20.5
      formula_by_student_count:
        top3_quota: "本校毕业生人数 * 3.2%"
        top8_quota: "本校毕业生人数 * 8.3%"
        total_quota: "本校毕业生人数 * 20.5%"
      # U5: 分配生最低录取名次修正（基于2025真实案例）
      minimum_rank_correction:
        note: "2025年真实数据显示：因前排学生弃分配选裸考/未达控制线，实际最低录取排名大于名额数"
        formula: "实际最低录取名次 ≈ 名额数 / (1 - 放弃率 - 滑档率) ≈ 名额数 × 1.3~1.4"
        evidence: "某初中杭高贡院16-17个名额但最低录取位次为第17名（前排有人选杭二/学军），2025年全市滑档率0.92%+放弃率约27%"
        example: "以451人初中为例：92个名额 → 实际最低录取名次约92 × 1.35 ≈ 124名（本文测试校嘉绿苑中学92名额≈124名）"

  # ---------- 裸考志愿策略 ----------
  open_exam:
    description: "全市竞争，核心看中考成绩和全市排名"
    dense_segment_warning: "⚠️ 620-625分段是全市最密集区间（2025年证实），此分段一分可能相差100-300名。裸考志愿在此分段需格外谨慎，梯度至少拉开3-5分。"
    gradient:
      desc: "10个裸考志愿按冲稳保梯度排列"
      rush: { count: 3, gap: "比预估分高5-15分" }
      steady: { count: "3-4", gap: "与预估分基本匹配（±5分）。如在620-625密集段，志愿间至少拉开3-5分" }
      safe: { count: 3, gap: "比预估分低10-20分，最后几个逐级拉开，确保绝对安全。最低保底应低于预估分20+分" }

  # ---------- 成绩定位方法 ----------
  score_estimation:
    methods:
      - id: "一模定位法"
        desc: "用2025中考各批次线与2026区一模划线的分差，叠加孩子一模成绩"
        source: "浙江慧升学（微信公众号）"
        usage: "裸考志愿定位"
      - id: "四次成绩综合法"
        desc: "结合八下期末、九上期末、一模、二模四次成绩综合定位"
        source: "多家公众号"
        usage: "分配生+裸考双定位"
      - id: "得分率换算法"
        desc: "前三所需得分率约96.46%，用得分率换算目标学校"
        source: "重高加速度（微信公众号）"
        usage: "裸考定位"
      - id: "区排定位法"
        desc: "区排名直接对应目标学校层次"
        usage: "裸考定位"

  # ---------- 分配生 vs 裸考决策矩阵（基于2025真实案例更新） ----------
  decision_matrix:
    - scenario: "强校头部学生（排名在前5%）"
      allocation: "分配生奋力冲前三所（可填2个冲），赌超常发挥后不被低录"
      open_exam: "裸考作为保险，确保即使分配不理想也能裸考进前八"
      warning: "冲太大有低录风险，但冲太小超常后更后悔（2025年632-635分教训）"
    - scenario: "强校中部学生（排名在5%-20%）"
      allocation: "分配稳为主，冲1个即可。分配生志愿必须强制托底"
      open_exam: "裸考放手一搏，可以更激进"
      warning: "这部分学生是2025年'超常发挥陷阱'的最大受害者群体"
    - scenario: "弱校头部学生（排名在前10%）"
      allocation: "分配生大胆冲！弱校红利最高差22分进重高"
      open_exam: "裸考稳保为主"
      leverage: "菜中分配生 = 降维打击机会"
    - scenario: "弱校中部学生（排名在10%-30%）"
      allocation: "分配生填满5个，靠前的学生弃分配后有机会捡漏"
      open_exam: "裸考多填保底"
      note: "边缘位次学生（如排名略超名额数）仍应填满分配生——2025年某校80名额录到110名的案例"

  # ---------- 4种高危填法（避坑指南）- 基于2025真实案例扩展 ----------
  danger_patterns:
    - id: "超常发挥陷阱"           # U1 新增
      priority: "最高"
      desc: "一模成绩一般→分配生志愿保守→中考超常发挥→被低档学校锁死"
      real_case: "2025年632-635分考生因一模保守填了中部重高，裸考本可进前两所，均后悔"
      fix: "分配生第1-2志愿必须敢于冲刺！冲幅至少10-20分，留足超常发挥的上升通道"
      risk_level: "极高"
    - id: "全冲无保"               # U3 强化
      priority: "高"
      desc: "分配生全部填头部，没有托底"
      real_case: "2025年两个平时成绩很好且自信的学生仅填1-2所头部→全部滑档→裸考从头来"
      fix: "分配生第5志愿必须为明确托底学校（低10-15分以上）。被录了总比滑档强"
      risk_level: "极高"
    - id: "620-625密集段误判"      # U4 新增
      priority: "中高"
      desc: "在620-625分段内裸考竞争最激烈，一分之差可能相差100+名，误判志愿梯度"
      fix: "620-625分段内志愿梯度至少拉开3-5分，不可填同分段的多个学校"
      risk_level: "高"
    - id: "保底梯度不足"
      desc: "最后3个志愿梯度不够"
      fix: "建议第9个志愿拉开15-20分"
    - id: "忽视民办承受力"
      desc: "保底填民办但未考虑经济承受力"
      fix: "填民办前先确认学费和家庭预算"

